name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e ".[dev]" pytest
      - run: python -m pytest -q
      - name: demo runs clean (self-catching factory)
        run: python -c "from forgeline.demo import run; run()"
  typescript-scaffold:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v5
        with:
          node-version: "22"
      - run: python -m pip install -e ".[dev]"
      - run: npm install --no-save --prefix .forge-tsc typescript@5
      - run: echo "${GITHUB_WORKSPACE}/.forge-tsc/node_modules/.bin" >> "$GITHUB_PATH"
      - run: echo "NODE_PATH=${GITHUB_WORKSPACE}/.forge-tsc/node_modules" >> "$GITHUB_ENV"
      - run: python -m pytest -q tests/test_forgeline.py -k typescript
